name: Mobile App Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'

jobs:
  unit-and-integration-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        run: npm run test:integration -- --coverage

      - name: Run component tests
        run: npm run test:components -- --coverage

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./mobile/coverage/lcov.info
          flags: mobile
          name: mobile-coverage

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: mobile/coverage

  e2e-tests-ios:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup iOS Simulator
        run: |
          xcrun simctl boot "iPhone 15" || true

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Build app for testing
        run: npm run e2e:build:ios

      - name: Run E2E tests
        run: npm run e2e:test:ios

      - name: Archive E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-ios-results
          path: mobile/e2e/artifacts

  e2e-tests-android:
    name: E2E Tests (Android)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          script: echo "Emulator started"

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Build app for testing
        run: npm run e2e:build:android

      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_4
          script: cd mobile && npm run e2e:test:android

      - name: Archive E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-android-results
          path: mobile/e2e/artifacts

  test-summary:
    name: Test Summary
    needs: [unit-and-integration-tests, e2e-tests-ios, e2e-tests-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "Unit & Integration Tests: ${{ needs.unit-and-integration-tests.result }}"
          echo "E2E Tests (iOS): ${{ needs.e2e-tests-ios.result }}"
          echo "E2E Tests (Android): ${{ needs.e2e-tests-android.result }}"
